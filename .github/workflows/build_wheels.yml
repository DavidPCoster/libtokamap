name: Build & Upload Wheels

on:
  push:
    tags:
      - "*"
    branches:
      - release/*
      - main
      - develop
      - feature/*

# prevent duplicate CI runs from separate triggers
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: build ${{matrix.build-platform[2]}} wheels on ${{matrix.build-platform[0]}} ${{matrix.build-platform[1]}}
    runs-on: ${{matrix.build-platform[0]}}
    strategy:
      fail-fast: false
      matrix:
        build-platform:
          # ubuntu/aarch64 emulation and manylinux2014 are both slow running builds
          # which are only executed on push to tag.
          # Test wheels are also generated for the other platforms (and uploaded to testpypi)
          # on pushes to release branches and to main
          - [ubuntu-latest, x86_64, manylinux_2_28_x86_64, 0.0]
          - [ubuntu-latest, aarch64, manylinux_2_28_aarch64, 0.0]
          - [macos-15-intel, x86_64, macosx_x86_64, 13.0]
          - [macos-15, arm64, macosx_arm64, 14.0]
          - [windows-latest, AMD64, win_amd64, 0.0]

    steps:
      - uses: actions/checkout@v6
        # need git tags available for setuptools_scm to grab tags
        with:
          fetch-depth: 0

      - uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: >
          cmake -B build -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DCMAKE_BUILD_TYPE=Release &&
          cmake --build build -j --config Release

      - name: Build Windows wheels
        if: runner.OS == 'Windows'
        uses: pypa/cibuildwheel@v3.4
        with:
          package-dir: ${{github.workspace}}/python
          config-file: ${{github.workspace}}/python/pyproject.toml
        env:
          CIBW_ARCHS: ${{matrix.build-platform[1]}}
          CIBW_PLATFORM: windows
          CIBW_BUILD: cp3*-${{matrix.build-platform[2]}}
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair -w {dest_dir} {wheel} --add-path ${{github.workspace}}/build"
          CIBW_BEFORE_BUILD_WINDOWS: "pip install delvewheel"

      - name: Build manylinux_2_28 wheels
        # hardware emulation for ubuntu on arm64 archiecture is much slower. Do not run that case except for push to tag.
        if: >
          startswith(matrix.build-platform[2], 'manylinux_2_28') &&
          ! ( startswith(matrix.build-platform[1], 'aarch64') &&
          !startsWith(github.ref, 'refs/tags/') )
        uses: pypa/cibuildwheel@v3.4
        with:
          package-dir: ./python
          config-file: ./python/pyproject.toml
        env:
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          CIBW_ARCHS: ${{matrix.build-platform[1]}}
          CIBW_BUILD: cp*-manylinux*
          CIBW_SKIP: cp*-musllinux* *-musllinux*
          CIBW_BEFORE_ALL: >
            dnf update -y &&
            dnf install -y https://dl.fedoraproject.org/pub/epel/epel-release-latest-8.noarch.rpm &&
            dnf install -y boost1.78-devel &&
            cd /project &&
            cmake -Bbuild -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DCMAKE_BUILD_TYPE=Release &&
            cmake --build build -j

      - name: Build on macOS
        if: runner.os == 'macOS'
        # note: it's recommended in cibuildwheel to build all deps from source in macos
        # instead of using homebrew as this way the wheel will be back-compatible with
        # other macos versions. MACOSX_DEPLOYMENT_TARGET will no longer be required if
        # this change is made.
        run: >
          cd ${{github.workspace}} &&
          cmake -Bbuild -DCMAKE_BUILD_TYPE=Release &&
          cmake --build build -j

      - name: Build macOS wheels
        if: runner.os == 'macOS'
        uses: pypa/cibuildwheel@v3.2.1
        with:
          package-dir: ./python
          config-file: ./python/pyproject.toml
        env:
          CIBW_ARCHS: ${{matrix.build-platform[1]}}
          CIBW_PLATFORM: macos
          # CIBW_SKIP: cp313*
          CIBW_BUILD: cp*-${{matrix.build-platform[2]}}
          MACOSX_DEPLOYMENT_TARGET: ${{matrix.build-platform[3]}}

      - name: Upload cibw build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  upload_pypi:
    # only upload to pypi for tagged releases
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: build_wheels
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/libtokamap
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          # unpacks all CIBW artifacts into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1

  upload_test_pypi:
    # push test wheels to testpypi for all intermediate release candidates (release/*, develop, etc.)
    # but never for feature branches
    if: >
      github.event_name == 'push' && !startsWith(github.ref, 'refs/heads/feature/')
    needs: build_wheels
    runs-on: ubuntu-latest
    environment:
      name: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          # unpacks all CIBW artifacts into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true
