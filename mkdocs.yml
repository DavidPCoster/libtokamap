site_name: LibTokaMap

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - scheme: default
      primary: white
      accent: light blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share

nav:
  - Home: index.md
  - Getting Started:
      - Using the Library: using-the-library.md
      - Contributing to LibTokaMap: contributing.md
  - Developer Resources:
      - Developer Resources: developer_resources/index.md
      - Knowledge Graph: developer_resources/knowledge_graph.md
      - API Patterns: developer_resources/api_patterns.md
      - Architectural Improvements: developer_resources/architectural_improvements.md
      - Array Library Alternatives: developer_resources/array_library_alternatives.md
      - Component Relationships: developer_resources/component_relationships.md
      - Refactoring Guide: developer_resources/refactoring_guide.md
  - Extending LibTokaMap:
      - Creating a New Data Source: creating-data-source.md
      - Creating Custom Function Libraries: creating-custom-functions.md

markdown_extensions:
  - admonition
  - codehilite:
      guess_lang: false
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - mkdocstrings
  - mike

extra:
  version:
    provider: mike
    default: latest
